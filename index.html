<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>아이온2 숙제 관리 대시보드</title>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        :root {
            --primary: #3d67b9;
            --primary-hover: #20458f;
            --bg: #121214;
            --card-bg: #181818;
            --card-border: #2a2a32;
            --text: #e3e3e6;
            --text-muted: #a1a1aa;
            --danger: #ff6b6b;
            --danger-hover: #fa5252;
            --success: #148761;
            --success-hover: #11694c;
            --input-bg: #2d2d37;
            --input-border: #3f3f4e;
            --account-content-bg: #1a1a20;
            --accent: #ffb86c;
            --timer-color: #4ade80;
            --modal-overlay: rgba(0, 0, 0, 0.6);
            --info-bg: #1e1e1e;
            --info-border: #2b3d5c;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.5;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #ffffff; font-size: 28px; margin: 0 0 10px 0; }
        
        /* 알람 대시보드 */
        .alarm-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .alarm-container > p {
            font-weight: bold;
            margin: 0;
            color: #fff;
            width: 100%;
            font-size: 14px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
        }
        .alarm-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            padding: 6px 12px;
            border-radius: 6px;
        }
        .alarm-title { font-weight: bold; font-size: 13px; }
        .alarm-timer { 
            color: var(--timer-color); 
            font-weight: bold; 
            background: #000; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-family: monospace;
            min-width: 70px;
            text-align: center;
        }
        .alarm-timer.disabled {
            color: var(--text-muted) !important;
            opacity: 0.5;
        }
        .alarm-urgent { color: var(--danger) !important; animation: blink 1s infinite; }
        
        /* 토글 스위치 */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }

        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* 안내사항 */
        .top_box {
            display: flex;
            justify-content: dashed;
            margin-bottom: 20px;
        }
        .info-box {
            width: 100%;
            background: var(--info-bg);
            border: 1px solid var(--info-border);
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            color: #cbd5e1;
        }
        .info-box ul { margin: 0; padding-left: 20px; }
        .info-box li { margin: 4px 0; }
        
        .control-menu { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-sm { padding: 4px 8px; font-size: 11px; margin: 0; }
        .btn-xs { padding: 4px 8px; font-size: 12px; margin: 0; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: var(--success-hover); }
        
        /* 계정 섹션 */
        .account-section { 
            background: var(--card-bg); 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid var(--card-border);
        }
        .account-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 20px;
            background: #1f1f23;
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
            cursor: pointer;
        }
        .account-header h2 { margin: 0; font-size: 16px; color: #ffffff; }
        .account-body { padding: 20px; display: block; }
        .account-body.collapsed { display: none; }
        
        .account-contents {
            background: var(--account-content-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .account-contents-title {
            font-weight: bold;
            font-size: 13px;
            color: var(--primary);
            width: 100%;
            margin-bottom: -10px;
        }
        .account-resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
        }
        .resource-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }

        .batch-add-form {
            display: flex;
            gap: 8px;
            background: #222227;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            align-items: center;
        }
        .batch-add-form input, .batch-add-form select {
            padding: 6px 10px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #fff;
            border-radius: 4px;
            font-size: 13px;
        }

        /* 캐릭터 그리드 */
        .char-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; 
        }
        .char-card { 
            border: 1px solid var(--card-border); 
            border-radius: 8px; 
            padding: 15px; 
            background: #151518; 
            display: flex;
            flex-direction: column;
        }
        .char-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
        }
        .char-name { font-weight: bold; font-size: 15px; color: #ffffff; }
        .char-class { font-size: 12px; color: var(--text-muted); margin-left: 6px; }
        
        .ode-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
            background: rgba(255,255,255,0.02);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }
        .counter-controls { display: flex; align-items: center; gap: 4px; }
        .counter-input { 
            width: 40px; 
            background: var(--input-bg); 
            border: 1px solid var(--input-border); 
            color: #fff; 
            text-align: center; 
            font-weight: bold; 
            border-radius: 4px;
            padding: 2px 0;
        }
        .counter-input::-webkit-inner-spin-button, 
        .counter-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .resource-group { margin-bottom: 12px; }
        .homework-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        
        /* 🎨 원본 스타일을 보존하되 숙제 가로 정렬 맞춤 */
        .hw-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #1e1e24; 
            padding: 8px 12px; 
            border-radius: 6px;
            border: 1px solid #2a2a35;
        }
        .hw-label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            flex: 1;
            min-width: 0;
        }
        .hw-label input[type="checkbox"] { 
            width: 15px; 
            height: 15px; 
            accent-color: var(--primary); 
            cursor: pointer; 
            flex-shrink: 0;
        }
        .hw-text { 
            font-size: 13px; 
            color: #e3e3e6;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .checked-text { 
            text-decoration: line-through; 
            color: var(--text-muted); 
            opacity: 0.6; 
        }

        /* ↕️ 순서 제어용 버튼 컴포넌트 */
        .hw-sort-controls {
            display: none;
            gap: 2px;
            margin-right: 6px;
        }
        .char-card.edit-mode .hw-sort-controls {
            display: flex;
        }
        .btn-sort {
            background: #2d2d37;
            color: #fff;
            border: 1px solid var(--card-border);
            padding: 2px 5px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-sort:hover { background: #3f3f4e; }
        
        .btn-b2 { background: none; border:none; color: var(--text-muted); font-size:12px; cursor:pointer;}
        .btn-b2:hover { color: #fff; }
        .btn-b3 { background: none; border:none; color: var(--text-muted); cursor:pointer; font-size:12px;}

        .add-form { display: flex; gap: 4px; margin-top: auto; }
        .add-form input, .add-form select { 
            padding: 4px 8px; 
            background: var(--input-bg);
            border: 1px solid var(--input-border); 
            color: var(--text);
            border-radius: 4px; 
            font-size: 12px;
        }
        .add-form input { flex: 1; }

        /* 제외 제어 스타일링 */
        .char-card.is-hidden-char { display: none !important; }
        body.show-hidden-chars-mode .char-card.is-hidden-char {
            display: flex !important;
            opacity: 0.35;
            filter: grayscale(0.8);
            border: 1px dashed var(--text-muted) !important;
        }

        .global-action-bar { margin-bottom: 15px; display: flex; gap: 10px; }
        .btn-toggle-hide {
            padding: 6px 12px;
            background-color: #222;
            border: 1px solid var(--card-border);
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
        }
        .btn-toggle-hide.active {
            background-color: var(--primary);
            color: #fff;
        }

        /* 모달 제어 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1c1c1f;
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 15px; }
        .modal-field { display: flex; flex-direction: column; margin-bottom: 12px; }
        .modal-field label { font-size: 12px; margin-bottom: 4px; color: var(--text-muted); }
        .modal-field input, .modal-field select {
            padding: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #fff;
            border-radius: 4px;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 15px; }

        .btn-b { background: #333; }
        
        /* 메모 스타일 */
        #memoModal { position: fixed; top:0; left:0; background: var(--modal-overlay); width:100%; height:100%; align-items:center; justify-content:center; }
        .char-memo-preview { background: rgba(255,255,255,0.03); border: 1px dashed var(--card-border); border-radius: 4px; padding: 4px 8px; margin-top: 8px; font-size: 12px; color: var(--accent); cursor: pointer; word-break: break-all; }
        
        .char-control-footer { display: flex; gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--card-border); }
        .char-control-footer button { flex: 1; }
        .char-memo-wrapper { position: relative; display: inline-block; }
        .memo-red-dot { position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; background-color: var(--danger); border-radius: 50%; }

        footer { text-align: center; font-size: 12px; color: #555; margin-top: 4px; padding-top: 20px; border-top: 1px solid var(--card-border); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>아이온2 숙제 관리 대시보드</h1>
    </header>

    <div class="top_box">
        <div class="alarm-container" id="alarmContainer">
            <p>⏰ 실시간 콘텐츠 알람</p>
        </div>

        <div class="info-box" style="display: none;">
            <ul>
                <li>모든 정보는 브라우저에 자동 저장됩니다.</li>
                <li>오드는 5분마다 1씩 충전됩니다.</li>
                <li>매일 05시 일일 숙제 및 오드가 초기화됩니다.</li>
            </ul>
        </div>
    </div>

    <div class="global-action-bar">
        <button id="toggleHideCompletedBtn" class="btn-toggle-hide" onclick="toggleHideCompleted()">
            ✅ 완료된 숙제 숨기기
        </button>
        <button id="toggleShowHiddenCharsBtn" class="btn-toggle-hide" onclick="toggleShowHiddenChars()">
            👁️ 제외 캐릭터 관리
        </button>
    </div>

    <div class="control-menu">
        <button class="btn" onclick="openAddAccountModal()">＋ 새 계정 추가</button>
    </div>

    <div id="app"></div>
</div>

<div id="addAccountModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'addAccountModal')">
    <div class="modal-content">
        <h3>새 계정 추가</h3>
        <div class="modal-field">
            <label for="newAccName">계정 이름</label>
            <input type="text" id="newAccName" placeholder="예: 본계정, 부계정1">
        </div>
        <div class="modal-actions">
            <button class="btn btn-b" onclick="closeModal('addAccountModal')">취소</button>
            <button class="btn" onclick="addNewAccount()">추가</button>
        </div>
    </div>
</div>

<div id="charModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'charModal')">
    <div class="modal-content">
        <h3 id="charModalTitle">캐릭터 추가</h3>
        <input type="hidden" id="modalAccId">
        <input type="hidden" id="modalCharId">
        <div class="modal-field">
            <label for="charName">캐릭터명</label>
            <input type="text" id="charName">
        </div>
        <div class="modal-field">
            <label for="charClass">직업</label>
            <select id="charClass">
                <option value="검성">검성</option>
                <option value="수호성">수호성</option>
                <option value="살성">살성</option>
                <option value="궁성">궁성</option>
                <option value="마도성">마도성</option>
                <option value="정령성">정령성</option>
                <option value="치유성">치유성</option>
                <option value="호법성">호법성</option>
            </select>
        </div>
        <div class="modal-field">
            <label for="charPower">전투력</label>
            <input type="number" id="charPower" value="0">
        </div>
        <div class="modal-actions">
            <button class="btn btn-b" onclick="closeModal('charModal')">취소</button>
            <button class="btn" id="charModalSubmitBtn" onclick="submitCharModal()">저장</button>
        </div>
    </div>
</div>

<div id="memoModal" class="modal-overlay" style="display:none;" onclick="closeModalOnOverlay(event, 'memoModal')">
    <div class="modal-content">
        <h3>캐릭터 메모 작성</h3>
        <input type="hidden" id="memoAccId">
        <input type="hidden" id="memoCharId">
        <div class="modal-field">
            <label for="charMemoText">메모 내용</label>
            <input type="text" id="charMemoText" placeholder="메모를 입력하세요.">
        </div>
        <div class="modal-actions">
            <button class="btn btn-b" onclick="closeModal('memoModal')">취소</button>
            <button class="btn" onclick="saveCharacterMemo()">저장</button>
        </div>
    </div>
</div>

<footer>
    © 당근. All rights reserved.
</footer>

<script>
    // 💡 기존 localStorage 연동 변수 동결 (aion2_accounts 변수명 절대 유지)
    let accounts = JSON.parse(localStorage.getItem('aion2_accounts')) || [];
    let isHideCompleted = JSON.parse(localStorage.getItem('aion2_isHideCompleted')) || false;
    let isShowHiddenChars = JSON.parse(localStorage.getItem('aion2_isShowHiddenChars')) || false;

    // 타임테이블 구성 목록 동결
    const ALARM_CONFIG = [
        { id: 'world_boss', title: '월드보스', interval: 14400, baseTime: new Date(2025, 0, 1, 0, 0, 0).getTime() },
        { id: 'rift', title: '시공의 균열', interval: 7200, baseTime: new Date(2025, 0, 1, 1, 0, 0).getTime() }
    ];

    let alarmToggles = JSON.parse(localStorage.getItem('aion2_alarmToggles')) || { world_boss: true, rift: true };

    function save() {
        localStorage.setItem('aion2_accounts', JSON.stringify(accounts));
        localStorage.setItem('aion2_isHideCompleted', JSON.stringify(isHideCompleted));
        localStorage.setItem('aion2_isShowHiddenChars', JSON.stringify(isShowHiddenChars));
    }

    function initAlarmToggles() {
        const container = document.getElementById('alarmContainer');
        container.innerHTML = '<p>⏰ 실시간 콘텐츠 알람</p>';
        
        ALARM_CONFIG.forEach(cfg => {
            const isChecked = alarmToggles[cfg.id] !== false;
            const div = document.createElement('div');
            div.className = 'alarm-item';
            div.innerHTML = `
                <span class="alarm-title">${cfg.title}</span>
                <span class="alarm-timer" id="timer_${cfg.id}">--:--:--</span>
                <label class="switch">
                    <input type="checkbox" id="toggle_${cfg.id}" ${isChecked ? 'checked' : ''} onchange="toggleAlarm('${cfg.id}')">
                    <span class="slider"></span>
                </label>
            `;
            container.appendChild(div);
        });
    }

    function toggleAlarm(id) {
        const chk = document.getElementById(`toggle_${id}`);
        alarmToggles[id] = chk.checked;
        localStorage.setItem('aion2_alarmToggles', JSON.stringify(alarmToggles));
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const now = Date.now();
        ALARM_CONFIG.forEach(cfg => {
            const timerEl = document.getElementById(`timer_${cfg.id}`);
            if (!timerEl) return;

            if (alarmToggles[cfg.id] === false) {
                timerEl.textContent = "꺼짐";
                timerEl.className = "alarm-timer disabled";
                return;
            }

            let elapsed = (now - cfg.baseTime) / 1000;
            let remain = cfg.interval - (elapsed % cfg.interval);
            if (remain <= 0) remain = cfg.interval;

            const h = Math.floor(remain / 3600);
            const m = Math.floor((remain % 3600) / 60);
            const s = Math.floor(remain % 60);

            timerEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            if (remain < 600) {
                timerEl.className = "alarm-timer alarm-urgent";
            } else {
                timerEl.className = "alarm-timer";
            }
        });
    }

    function toggleHideCompleted() {
        isHideCompleted = !isHideCompleted;
        const btn = document.getElementById('toggleHideCompletedBtn');
        if (isHideCompleted) btn.classList.add('active');
        else btn.classList.remove('active');
        save();
        render();
    }

    function toggleShowHiddenChars() {
        isShowHiddenChars = !isShowHiddenChars;
        const btn = document.getElementById('toggleShowHiddenCharsBtn');
        if (isShowHiddenChars) btn.classList.add('active');
        else btn.classList.remove('active');
        save();
        render();
    }

    function toggleAccountAccordion(accId) {
        const body = document.getElementById(`accBody_${accId}`);
        if (body.classList.contains('collapsed')) {
            body.classList.remove('collapsed');
        } else {
            body.classList.add('collapsed');
        }
    }

    function openAddAccountModal() { document.getElementById('addAccountModal').style.display = 'flex'; }
    function openAddCharModal(accId) {
        document.getElementById('charModalTitle').textContent = "새 캐릭터 추가";
        document.getElementById('modalAccId').value = accId;
        document.getElementById('modalCharId').value = "";
        document.getElementById('charName').value = "";
        document.getElementById('charClass').value = "검성";
        document.getElementById('charPower').value = "0";
        document.getElementById('charModal').style.display = 'flex';
    }
    function openEditCharModal(accId, charId, event) {
        if(event) event.stopPropagation();
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        document.getElementById('charModalTitle').textContent = "캐릭터 설정 수정";
        document.getElementById('modalAccId').value = accId;
        document.getElementById('modalCharId').value = charId;
        document.getElementById('charName').value = char.name;
        document.getElementById('charClass').value = char.class;
        document.getElementById('charPower').value = char.power || 0;
        document.getElementById('charModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function closeModalOnOverlay(e, id) { if(e.target.id === id) closeModal(id); }

    function addNewAccount() {
        const name = document.getElementById('newAccName').value.trim();
        if(!name) return alert('계정 이름을 입력하세요.');
        accounts.push({
            id: Date.now(),
            name: name,
            resources: { q_crystals: 0, o_crystals: 0, membership: 0 },
            characters: []
        });
        document.getElementById('newAccName').value = "";
        closeModal('addAccountModal');
        save();
        render();
    }

    function removeAccount(accId, event) {
        if(event) event.stopPropagation();
        if(!confirm('해당 계정과 포함된 모든 캐릭터 정보가 삭제됩니다. 진행하시겠습니까?')) return;
        accounts = accounts.filter(a => a.id !== accId);
        save();
        render();
    }

    function submitCharModal() {
        const accId = parseInt(document.getElementById('modalAccId').value);
        const charId = document.getElementById('modalCharId').value;
        const name = document.getElementById('charName').value.trim();
        const cls = document.getElementById('charClass').value;
        const power = parseInt(document.getElementById('charPower').value) || 0;

        if(!name) return alert('캐릭터명을 입력하세요.');
        const acc = accounts.find(a => a.id === accId);

        if(charId === "") {
            acc.characters.push({
                id: Date.now(),
                name: name,
                class: cls,
                power: power,
                ode: 100,
                odeMax: 100,
                lastOdeUpdate: Date.now(),
                resources: { d_tickets: 0, w_tickets: 0 },
                homeworks: [
                    { id: 1, text: '일일 미션 수행', type: 'daily', checked: false },
                    { id: 2, text: '투기장 3회 참여', type: 'daily', checked: false },
                    { id: 3, text: '주간 인던 클리어', type: 'weekly', checked: false }
                ]
            });
        } else {
            const char = acc.characters.find(c => c.id === parseInt(charId));
            char.name = name;
            char.class = cls;
            char.power = power;
        }
        closeModal('charModal');
        save();
        render();
    }

    function removeCharacter(accId, charId, event) {
        if(event) event.stopPropagation();
        if(!confirm('정말 삭제하시겠습니까?')) return;
        const acc = accounts.find(a => a.id === accId);
        acc.characters = acc.characters.filter(c => c.id !== charId);
        save();
        render();
    }

    function toggleCharHiddenState(accId, charId, event) {
        if(event) event.stopPropagation();
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        char.isHiddenChar = !char.isHiddenChar;
        save();
        render();
    }

    function changeOde(accId, charId, amount) {
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        char.ode = Math.max(0, Math.min(char.odeMax || 100, (char.ode || 0) + amount));
        char.lastOdeUpdate = Date.now();
        save();
        render();
    }

    function setOdeDirect(accId, charId, val) {
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        let v = parseInt(val);
        if(isNaN(v)) v = 0;
        char.ode = Math.max(0, Math.min(char.odeMax || 100, v));
        char.lastOdeUpdate = Date.now();
        save();
    }

    function toggleHw(accId, charId, hwId) {
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        const hw = char.homeworks.find(h => h.id === hwId);
        hw.checked = !hw.checked;
        save();
        render();
    }

    function addCustomHw(accId, charId) {
        const textInput = document.getElementById(`addHwText_${charId}`);
        const typeSelect = document.getElementById(`addHwType_${charId}`);
        const text = textInput.value.trim();
        const type = typeSelect.value;
        if(!text) return;
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        char.homeworks.push({ id: Date.now(), text: text, type: type, checked: false });
        textInput.value = "";
        save();
        render();
    }

    function deleteHw(accId, charId, hwId, event) {
        if(event) event.stopPropagation();
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        char.homeworks = char.homeworks.filter(h => h.id !== hwId);
        save();
        render();
    }

    /* ⚙️ 편집모드(순서 배치 변경) 활성화 토글 함수 */
    function toggleEditMode(charId) {
        const card = document.getElementById(`charCard_${charId}`);
        card.classList.toggle('edit-mode');
    }

    /* ↕️ 숙제 배열 위치 실시간 스왑 및 이동 제어 함수 */
    function moveHw(accId, charId, hwId, direction) {
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        const index = char.homeworks.findIndex(h => h.id === hwId);
        if (index === -1) return;

        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= char.homeworks.length) return;

        // 배열 순서 스왑
        const temp = char.homeworks[index];
        char.homeworks[index] = char.homeworks[newIndex];
        char.homeworks[newIndex] = temp;

        save();
        render();
        
        // 정렬 편집 유지
        document.getElementById(`charCard_${charId}`).classList.add('edit-mode');
    }

    function openMemoModal(accId, charId, event) {
        if(event) event.stopPropagation();
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        document.getElementById('memoAccId').value = accId;
        document.getElementById('memoCharId').value = charId;
        document.getElementById('charMemoText').value = char.memo || "";
        document.getElementById('memoModal').style.display = 'flex';
    }

    // 어비스 게이지 일주일 리셋 검증 로직 명시 보존
    function checkAbyssReset() {
        const lastReset = localStorage.getItem('aion2_last_abyss_reset') || "0";
        const now = new Date();
        let lastResetDate = new Date(parseInt(lastReset));
        let daysUntilWednesday = (3 - now.getDay() + 7) % 7;
        let resetCriterion = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysUntilWednesday, 5, 0, 0);
        if (now < resetCriterion && now.getDay() === 3 && now.getHours() < 5) {}
        else { resetCriterion.setDate(resetCriterion.getDate() - 7); }
        if (lastResetDate < resetCriterion) {
            accounts.forEach(acc => {
                acc.characters.forEach(char => {
                    if (char.abyss) {
                        char.abyss.value = 0;
                        char.abyss.level = 1;
                        char.abyss.exp = 0;
                    }
                });
            });
            localStorage.setItem('aion2_last_abyss_reset', Date.now().toString());
            save();
        }
    }

    function saveCharacterMemo() {
        const accId = parseInt(document.getElementById('memoAccId').value);
        const charId = parseInt(document.getElementById('memoCharId').value);
        const text = document.getElementById('charMemoText').value.trim();
        const acc = accounts.find(a => a.id === accId);
        const char = acc.characters.find(c => c.id === charId);
        char.memo = text;
        closeModal('memoModal');
        save();
        render();
    }

    function addCharacterBatch(accId) {
        const nameInput = document.getElementById(`batchName_${accId}`);
        const classSelect = document.getElementById(`batchClass_${accId}`);
        const name = nameInput.value.trim();
        const cls = classSelect.value;
        if (!name) return alert('캐릭터명을 입력해주세요.');
        const acc = accounts.find(a => a.id === accId);
        acc.characters.push({
            id: Date.now(), name: name, class: cls, power: 0, ode: 100, odeMax: 100, lastOdeUpdate: Date.now(),
            resources: { d_tickets: 0, w_tickets: 0 },
            homeworks: [
                { id: 1, text: '일일 미션 수행', type: 'daily', checked: false },
                { id: 2, text: '투기장 3회 참여', type: 'daily', checked: false },
                { id: 3, text: '주간 인던 클리어', type: 'weekly', checked: false }
            ]
        });
        nameInput.value = "";
        save();
        render();
    }

    function updateOdeAutomatically() {
        const now = Date.now();
        let updated = false;
        accounts.forEach(acc => {
            acc.characters.forEach(char => {
                if(!char.odeMax) char.odeMax = 100;
                if(char.ode < char.odeMax) {
                    const elapsedMs = now - (char.lastOdeUpdate || now);
                    const ticks = Math.floor(elapsedMs / 300000); 
                    if(ticks > 0) {
                        char.ode = Math.min(char.odeMax, (char.ode || 0) + ticks);
                        char.lastOdeUpdate = (char.lastOdeUpdate || now) + (ticks * 300000);
                        updated = true;
                    }
                } else {
                    char.lastOdeUpdate = now;
                }
            });
        });
        if(updated) save();
    }

    function checkAndReduceMembershipTime() {
        const lastCheck = localStorage.getItem('aion2_last_membership_check');
        const now = Date.now();
        if (!lastCheck) {
            localStorage.setItem('aion2_last_membership_check', now.toString());
            return;
        }
        const diffHours = (now - parseInt(lastCheck)) / 3600000;
        if (diffHours >= 1) {
            const hoursToReduce = Math.floor(diffHours);
            accounts.forEach(acc => {
                if (acc.resources && acc.resources.membership > 0) {
                    acc.resources.membership = Math.max(0, acc.resources.membership - hoursToReduce);
                }
            });
            localStorage.setItem('aion2_last_membership_check', (parseInt(lastCheck) + hoursToReduce * 3600000).toString());
            save();
            render();
        }
    }

    function checkDailyReset() {
        const lastReset = localStorage.getItem('aion2_last_daily_reset') || "0";
        const now = new Date();
        let lastResetDate = new Date(parseInt(lastReset));
        let resetCriterion = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 0, 0);
        if (now < resetCriterion) { resetCriterion.setDate(resetCriterion.getDate() - 1); }
        if (lastResetDate < resetCriterion) {
            accounts.forEach(acc => {
                acc.characters.forEach(char => {
                    char.homeworks.forEach(hw => { if(hw.type === 'daily') hw.checked = false; });
                    char.ode = char.odeMax || 100; char.lastOdeUpdate = Date.now();
                });
            });
            localStorage.setItem('aion2_last_daily_reset', Date.now().toString());
            save(); render();
        }
    }

    function checkWeeklyReset() {
        const lastReset = localStorage.getItem('aion2_last_weekly_reset') || "0";
        const now = new Date();
        let lastResetDate = new Date(parseInt(lastReset));
        let daysUntilWednesday = (3 - now.getDay() + 7) % 7;
        let resetCriterion = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysUntilWednesday, 5, 0, 0);
        if (now < resetCriterion && now.getDay() === 3 && now.getHours() < 5) {}
        else { resetCriterion.setDate(resetCriterion.getDate() - 7); }
        if (lastResetDate < resetCriterion) {
            accounts.forEach(acc => {
                acc.characters.forEach(char => {
                    char.homeworks.forEach(hw => { if(hw.type === 'weekly') hw.checked = false; });
                });
            });
            localStorage.setItem('aion2_last_weekly_reset', Date.now().toString());
            save(); render();
        }
    }

    function render() {
        const app = document.getElementById('app');
        if(accounts.length === 0) {
            app.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-muted);">💡 계정을 생성해 주세요.</div>';
            return;
        }

        let html = '';
        accounts.forEach(acc => {
            html += `
                <div class="account-section" id="accSection_${acc.id}">
                    <div class="account-header" onclick="toggleAccountAccordion(${acc.id})">
                        <h2>${acc.name}</h2>
                        <div>
                            <button class="btn btn-xs btn-danger" onclick="removeAccount(${acc.id}, event)">계정삭제</button>
                        </div>
                    </div>
                    <div class="account-body" id="accBody_${acc.id}">

                        <div class="batch-add-form">
                            <input type="text" id="batchName_${acc.id}" placeholder="빠른 캐릭터명">
                            <select id="batchClass_${acc.id}">
                                <option value="검성">검성</option><option value="수호성">수호성</option>
                                <option value="살성">살성</option><option value="궁성">궁성</option>
                                <option value="마도성">마도성</option><option value="정령성">정령성</option>
                                <option value="치유성">치유성</option><option value="호법성">호법성</option>
                            </select>
                            <button class="btn btn-xs" onclick="addCharacterBatch(${acc.id})">빠른캐릭추가</button>
                        </div>

                        <div class="char-grid">
            `;

            if(acc.characters.length > 0) {
                acc.characters.forEach(char => {
                    const isHiddenChar = char.isHiddenChar || false;
                    const charCardClass = isHiddenChar ? "char-card is-hidden-char" : "char-card";

                    html += `
                        <div class="${charCardClass}" id="charCard_${char.id}">
                            <div class="char-header">
                                <div>
                                    <span class="char-name">${char.name}</span>
                                    <span class="char-class">${char.class}</span>
                                    <span style="font-size:11px; color:var(--accent); margin-left:6px;">${char.power ? char.power.toLocaleString() : 0}</span>
                                </div>
                                <button class="btn-b3" onclick="toggleCharHiddenState(${acc.id}, ${char.id}, event)">
                                    ${isHiddenChar ? '👁️' : '❌'}
                                </button>
                            </div>

                            <div class="ode-row">
                                <span>⚡ 오드 에너지</span>
                                <div class="counter-controls">
                                    <input type="number" class="counter-input" value="${char.ode}" onchange="setOdeDirect(${acc.id}, ${char.id}, this.value)">
                                    <span>/ ${char.odeMax || 100}</span>
                                    <button class="btn btn-xs" onclick="changeOde(${acc.id}, ${char.id}, -10)">-10</button>
                                    <button class="btn btn-xs" onclick="changeOde(${acc.id}, ${char.id}, 10)">+10</button>
                                </div>
                            </div>

                            <div class="homework-group">
                    `;

                    char.homeworks.forEach(hw => {
                        if (isHideCompleted && hw.checked) return;
                        const labelClass = hw.checked ? "hw-label checked-text" : "hw-label";
                        let badgeColor = "var(--primary)";
                        if(hw.type === 'weekly') badgeColor = "#7c3aed";

                        html += `
                            <div class="hw-item">
                                <label class="${labelClass}">
                                    <input type="checkbox" ${hw.checked ? 'checked' : ''} onchange="toggleHw(${acc.id}, ${char.id}, ${hw.id})">
                                    <span style="font-size:9px; color:#fff; background:${badgeColor}; padding:1px 3px; border-radius:3px; font-weight:bold; flex-shrink:0;">
                                        ${hw.type === 'daily' ? '일' : '주'}
                                    </span>
                                    <span class="hw-text" title="${hw.text}">${hw.text}</span>
                                </label>
                                
                                <div class="hw-sort-controls">
                                    <button class="btn-sort" onclick="moveHw(${acc.id}, ${char.id}, ${hw.id}, -1)">▲</button>
                                    <button class="btn-sort" onclick="moveHw(${acc.id}, ${char.id}, ${hw.id}, 1)">▼</button>
                                </div>

                                <button class="btn-b2" onclick="deleteHw(${acc.id}, ${char.id}, ${hw.id}, event)">✕</button>
                            </div>
                        `;
                    });

                    // 💡 아래 하단 버튼들 클래스명 원본 동결 (btn-char-edit, btn-char-del 완벽 복구)
                    html += `
                            </div>
                            
                            <div class="add-form">
                                <input type="text" id="addHwText_${char.id}" placeholder="새 숙제 추가...">
                                <select id="addHwType_${char.id}">
                                    <option value="daily">일일</option>
                                    <option value="weekly">주간</option>
                                </select>
                                <button class="btn btn-xs" onclick="addCustomHw(${acc.id}, ${char.id})">＋</button>
                                <button class="btn btn-xs btn-b" onclick="toggleEditMode(${char.id})" title="순서 변경 설정">⚙️</button>
                            </div>

                            ${char.memo ? `<div class="char-memo-preview" onclick="openMemoModal(${acc.id}, ${char.id}, event)">${char.memo}</div>` : ''}

                            <div class="char-control-footer">
                                <div class="char-memo-wrapper">
                                    <button class="btn btn-xs btn-char-memo" style="background:#444;" onclick="openMemoModal(${acc.id}, ${char.id}, event)">메모</button>
                                    ${char.memo ? `<div class="memo-red-dot"></div>` : ''}
                                </div>
                                <button class="btn btn-xs btn-char-edit" onclick="openEditCharModal(${acc.id}, ${char.id}, event)">설정</button>
                                <button class="btn btn-xs btn-char-del" onclick="removeCharacter(${acc.id}, ${char.id}, event)">삭제</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:13px; padding:20px 0;\">💡 캐릭터를 추가해 주세요!</div>`;
            }

            html += `</div></div></div>`;
        });

        app.innerHTML = html; updateTimerDisplay();
        if (isHideCompleted) document.body.classList.add('hide-completed-mode'); else document.body.classList.remove('hide-completed-mode');
        if (isShowHiddenChars) document.body.classList.add('show-hidden-chars-mode'); else document.body.classList.remove('show-hidden-chars-mode');
    }

    checkAndReduceMembershipTime(); updateOdeAutomatically(); checkAbyssReset(); checkDailyReset(); checkWeeklyReset(); render(); initAlarmToggles();
    setInterval(updateTimerDisplay, 1000);
    setInterval(() => { checkAndReduceMembershipTime(); updateOdeAutomatically(); checkAbyssReset(); checkDailyReset(); checkWeeklyReset(); }, 60000);
</script>
</body>
</html>
